display_errors = On
error_reporting = E_ALL
memory_limit = 256M
max_execution_time = 60

[xdebug]
xdebug.mode = develop,debug
xdebug.start_with_request = trigger
; Colima: use the VM gateway IP instead of host.docker.internal
; Run `colima ssh -- ip route | grep default` to confirm your gateway IP
; Default Colima gateway is typically 192.168.106.1
xdebug.client_host = 192.168.106.1
xdebug.client_port = 9003

ffi.enable=1
