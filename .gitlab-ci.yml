# ─────────────────────────────────────────────────────────────────────────────
# Provider Service (Product Service) — GitLab CI Pipeline
#
# Flow:
#   build → test → pact-verify → can-i-deploy → deploy
#
# Key difference from the consumer pipeline:
#   - There is NO pact-publish stage (the provider doesn't generate pacts)
#   - Instead, pact-verify FETCHES pacts from the broker and replays them
#     against the real running provider to prove compliance
#   - can-i-deploy then confirms it's safe to ship this provider version
#
# Webhook trigger:
#   The PACT broker can be configured to trigger this pipeline automatically
#   when a consumer publishes new pacts — see docs/ci-cd-flow.md for setup.
#
# Required CI/CD variables (Settings → CI/CD → Variables):
#   PACT_BROKER_BASE_URL Your ngrok URL e.g. https://abc123.ngrok.io
#     (self-hosted fallback: internal broker URL on your network)
#   PACT_BROKER_USERNAME pact
#   PACT_BROKER_PASSWORD (mark as Masked)
# ─────────────────────────────────────────────────────────────────────────────

image: php:8.3-cli-alpine

stages:
  - build
  - test
  - pact-verify
  - can-i-deploy
  - deploy

# ── Variables ─────────────────────────────────────────────────────────────────
variables:
    COMPOSER_HOME: "$CI_PROJECT_DIR/.composer"
    APP_ENV: "test"
    # PACT_BROKER_BASE_URL: "${PACT_BROKER_BASE_URL}"
    # PACT_BROKER_USERNAME: "${PACT_BROKER_USERNAME}"
    # PACT_BROKER_PASSWORD: "${PACT_BROKER_PASSWORD}"
    PROVIDER_NAME: "ProductService"
    APP_VERSION: "${CI_COMMIT_SHORT_SHA}"
    # URL of the provider during CI — spin up the app in a service container
     # or point at a review/staging environment
    PROVIDER_BASE_URL: "http://localhost:8002"

# ── Cache ─────────────────────────────────────────────────────────────────────
cache:
  key: "${CI_COMMIT_REF_SLUG}-composer"
  paths:
    - vendor/
    - .composer/

# ── Services — run the provider app alongside the test runner ─────────────────
services:
  - name: php:8.3-fpm-alpine
    alias: provider-app

# ── Before script ─────────────────────────────────────────────────────────────
before_script:
    - apk add --no-cache curl zip unzip git icu-dev oniguruma-dev libzip-dev libffi-dev bash $PHPIZE_DEPS linux-headers
    - docker-php-ext-install intl zip mbstring ffi
    - echo "ffi.enable=1" >> /usr/local/etc/php/php.ini
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer

# ─────────────────────────────────────────────────────────────────────────────
# STAGE: build
# ─────────────────────────────────────────────────────────────────────────────
composer-install:
  stage: build
  script:
    - composer install --no-interaction --optimize-autoloader --no-progress
  artifacts:
    paths:
      - vendor/
    expire_in: 1 hour

# ─────────────────────────────────────────────────────────────────────────────
# STAGE: test
# ─────────────────────────────────────────────────────────────────────────────
unit-tests:
  stage: test
  needs: [composer-install]
  script:
    - php vendor/bin/phpunit tests/ --exclude-group=contract --testdox
  artifacts:
    reports:
      junit: test-results/junit.xml
    when: always

# ─────────────────────────────────────────────────────────────────────────────
# STAGE: pact-verify
#
# This is the provider's equivalent of the consumer's pact-test stage.
#
# What happens here:
#   1. The PACT verifier fetches ALL pacts for ProductService from the broker
#      (including pacts from every consumer — right now just OrderService)
#   2. It replays each interaction (request) against the REAL running provider
#   3. It asserts the real responses match the consumer's expectations
#   4. Results are published back to the broker
#
# If a consumer published a new pact that this provider version doesn't satisfy
# → this job fails → can-i-deploy fails → deployment blocked.
# ─────────────────────────────────────────────────────────────────────────────
pact-verify:
    stage: pact-verify
    needs: [unit-tests]
    script:
        - php -S 0.0.0.0:8002 -t public/ &
        - sleep 3
        - |
            PROVIDER_BASE_URL="${PROVIDER_BASE_URL}" \
            PACT_BROKER_URL="${PACT_BROKER_BASE_URL}" \
            PACT_BROKER_USERNAME="${PACT_BROKER_USERNAME}" \
            PACT_BROKER_PASSWORD="${PACT_BROKER_PASSWORD}" \
            APP_VERSION="${APP_VERSION}" \
            CI_COMMIT_REF_NAME="${CI_COMMIT_REF_NAME}" \
            php vendor/bin/phpunit tests/Contract --testdox
    rules:
        - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop" || $CI_PIPELINE_SOURCE == "merge_request_event"'
        - if: '$CI_PIPELINE_SOURCE == "trigger"'

# ─────────────────────────────────────────────────────────────────────────────
# STAGE: can-i-deploy
#
# THE SAFETY GATE (provider side).
#
# Asks: "Is this version of ProductService safe to deploy to production?"
# The broker checks all consumers that have a pact with ProductService and
# confirms this provider version has successfully verified all of them.
#
# Scenario this catches:
#   Team A changes GET /api/products/{id} to return `product_name` instead
#   of `name`. The consumer's contract says it expects `name`. Verification
#   fails. can-i-deploy returns non-zero. Pipeline blocked. Team A is notified
#   BEFORE the breaking change ever reaches production.
# ─────────────────────────────────────────────────────────────────────────────
can-i-deploy:
  stage: can-i-deploy
  needs: [pact-verify]
  image: pactfoundation/pact-cli:latest
  before_script: []
  script:
    - |
      pact-broker can-i-deploy \
        --pacticipant="${PROVIDER_NAME}" \
        --version="${APP_VERSION}" \
        --to-environment=production \
        --broker-base-url="${PACT_BROKER_BASE_URL}" \
        --broker-username="${PACT_BROKER_USERNAME}" \
        --broker-password="${PACT_BROKER_PASSWORD}" \
        --retry-while-unknown=6 \
        --retry-interval=10
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ─────────────────────────────────────────────────────────────────────────────
# STAGE: deploy
# ─────────────────────────────────────────────────────────────────────────────
deploy-production:
  stage: deploy
  needs: [can-i-deploy]
  image: alpine:latest
  before_script: []
  script:
    - echo "Deploying ProductService ${APP_VERSION} to production..."
    # ── Replace below with your real deploy command ──────────────────────────
    # - kubectl set image deployment/product-service app=registry.example.com/product-service:${APP_VERSION}
    # - helm upgrade product-service ./charts/product-service --set image.tag=${APP_VERSION}
    - echo "Deploy complete."
  environment:
    name: production
  after_script:
    # Record this provider version as deployed — consumers' can-i-deploy
    # checks will now reference this version as the production baseline
    - |
      docker run --rm pactfoundation/pact-cli:latest \
        pact-broker record-deployment \
          --pacticipant="${PROVIDER_NAME}" \
          --version="${APP_VERSION}" \
          --environment=production \
          --broker-base-url="${PACT_BROKER_BASE_URL}" \
          --broker-username="${PACT_BROKER_USERNAME}" \
          --broker-password="${PACT_BROKER_PASSWORD}"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
